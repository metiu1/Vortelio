<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Vortelio</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg2); }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 80px 24px 40px;
    }
    .auth-card {
      width: 100%; max-width: 390px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px;
      display: flex; flex-direction: column; gap: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    .auth-logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .auth-card h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.02em; }
    .auth-card .sub { font-size: 14px; color: var(--text2); margin-top: -8px; }
    .tabs { display: flex; background: var(--bg2); border-radius: var(--radius-sm); padding: 3px; gap: 3px; }
    .tab {
      flex: 1; padding: 8px; text-align: center; font-size: 14px; font-weight: 500;
      cursor: pointer; color: var(--text2); border-radius: 5px; transition: background .12s, color .12s;
    }
    .tab.on { background: var(--bg); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 13px; color: var(--text2); font-weight: 500; }
    .inp {
      width: 100%; padding: 10px 13px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-size: 14px; outline: none; font-family: inherit;
      transition: border-color .12s;
    }
    .inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,91,214,.1); }
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--text3);
    }
    .or-divider::before, .or-divider::after { content:''; flex:1; border-top: 1px solid var(--border); }
    .err { font-size: 13px; color: #dc2626; min-height: 18px; text-align: center; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: background .12s;
    }
    .google-btn:hover { background: var(--bg2); }
    .forgot { font-size: 13px; color: var(--text3); text-align: right; cursor: pointer; }
    .forgot:hover { color: var(--text2); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5b5bd6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/>
    </svg>
    Vortelio
  </a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div>
      <div class="auth-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5b5bd6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 3v4M12 17v4M3 12h4M17 12h4"/>
        </svg>
        Vortelio
      </div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to manage your plan and cloud access.</p>
    </div>

    <div class="tabs">
      <div class="tab on" id="tab-in" onclick="switchTab('in')">Sign in</div>
      <div class="tab"    id="tab-up" onclick="switchTab('up')">Create account</div>
    </div>

    <button class="google-btn" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H9v3h4.28C12.69 13.01 11.12 14 9 14a5 5 0 110-10c1.24 0 2.36.46 3.22 1.2L14.4 3C13.08 1.79 11.13 1 9 1a8 8 0 100 16c4.42 0 8-3.22 8-8 0-.54-.06-1.06-.15-1.56L16.51 8z"/>
      </svg>
      Continue with Google
    </button>

    <div class="or-divider">or</div>

    <div class="field">
      <label for="email">Email</label>
      <input class="inp" id="email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input class="inp" id="password" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')submit()">
      <span class="forgot" id="forgot-link" onclick="forgotPassword()">Forgot password?</span>
    </div>

    <div class="err" id="err"></div>

    <button class="btn primary" style="width:100%;padding:12px" onclick="submit()" id="submit-btn">Sign in</button>

    <p style="font-size:12px;color:var(--text3);text-align:center">
      By continuing you agree to our <a href="terms.html" style="color:var(--text3)">Terms</a> and <a href="privacy.html" style="color:var(--text3)">Privacy Policy</a>.
    </p>
  </div>
</div>

<div id="toast"></div>
<script src="js/main.js"></script>
<script>
let mode = 'in';

function switchTab(m) {
  mode = m;
  document.getElementById('tab-in').classList.toggle('on', m === 'in');
  document.getElementById('tab-up').classList.toggle('on', m === 'up');
  document.getElementById('submit-btn').textContent = m === 'in' ? 'Sign in' : 'Create account';
  document.getElementById('forgot-link').style.display = m === 'in' ? '' : 'none';
  document.querySelector('h1').textContent = m === 'in' ? 'Welcome back' : 'Create account';
  document.getElementById('err').textContent = '';
}

function setErr(msg) { document.getElementById('err').textContent = msg; }

async function googleSignIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try { await firebase.auth().signInWithPopup(provider); redirect(); }
  catch(e) { setErr(e.message); }
}

async function submit() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { setErr('Email and password required.'); return; }
  setErr('');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  try {
    if (mode === 'in') await firebase.auth().signInWithEmailAndPassword(email, password);
    else               await firebase.auth().createUserWithEmailAndPassword(email, password);
    redirect();
  } catch(e) {
    setErr(e.message);
    btn.disabled = false; btn.textContent = mode === 'in' ? 'Sign in' : 'Create account';
  }
}

async function forgotPassword() {
  const email = document.getElementById('email').value.trim();
  if (!email) { setErr('Enter your email first.'); return; }
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    setErr(''); toast('Password reset email sent.');
  } catch(e) { setErr(e.message); }
}

function redirect() {
  const back = sessionStorage.getItem('loginRedirect') || 'index.html';
  sessionStorage.removeItem('loginRedirect');
  window.location.href = back;
}

firebase.auth().onAuthStateChanged(user => {
  if (user) { checkPendingPlan(); redirect(); }
});
</script>
</body>
</html>
